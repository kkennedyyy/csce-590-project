version: '3.9'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: classfinder-db
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: 'Your_password123'
    ports:
      - '1433:1433'
    volumes:
      - sql_data:/var/opt/mssql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: classfinder-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: 'Server=db,1433;Database=ClassFinderDb;User Id=sa;Password=Your_password123;TrustServerCertificate=true'
    ports:
      - '8080:8080'
    depends_on:
      - db
    command: ["dotnet", "backend.dll"]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: 'http://localhost:8080'
    container_name: classfinder-frontend
    ports:
      - '5173:80'
    depends_on:
      - backend

volumes:
  sql_data:
